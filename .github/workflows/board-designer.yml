name: Board Designer Build

on:
  push:
    branches: [main]
    paths:
      - 'board-designer/**'
      - '.github/workflows/board-designer.yml'
  pull_request:
    paths:
      - 'board-designer/**'
      - '.github/workflows/board-designer.yml'
  workflow_dispatch:

permissions:
  contents: write   # publish the APK as a GitHub Release asset

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build web designer bundle
        working-directory: board-designer/web
        run: |
          npm ci
          npm run test
          npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('board-designer/android/**/*.gradle*', 'board-designer/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x board-designer/android/gradlew

      - name: Assemble debug APK
        working-directory: board-designer/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: board-designer-debug-${{ github.run_number }}
          path: board-designer/android/app/build/outputs/apk/debug/*.apk

      # On push to main, publish the APK as a GitHub Release asset so it has a
      # permanent, login-free download link anyone can use (no zip, no account):
      #   https://github.com/<owner>/mobile-designer/releases/latest/download/app-debug.apk
      # Unique tag per run + make_latest keeps that `latest` URL pointing at the
      # newest build.
      - name: Publish APK to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-${{ github.run_number }}
          name: Board Designer build ${{ github.run_number }}
          make_latest: true
          body: |
            Offline board-layout designer — debug APK (installs directly, debug-signed).

            **Download:** `app-debug.apk` below, or the always-latest link:
            `…/releases/latest/download/app-debug.apk`
          files: board-designer/android/app/build/outputs/apk/debug/*.apk
